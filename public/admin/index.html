<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubPrice 管理后台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --card: #1a1a25;
    --border: #2a2a3a; --accent: #00e5a0; --accent2: #ff6b35;
    --text: #f0f0f5; --muted: #6b6b80; --gold: #ffd166;
    --danger: #ef4444;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  /* Login */
  .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 40px; width: 360px; }
  .login-box h2 { margin-bottom: 20px; color: var(--accent); }
  .login-box input { width: 100%; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; margin-bottom: 12px; outline: none; }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: #000; font-weight: 700; font-size: 14px; cursor: pointer; }
  .login-box button:hover { opacity: 0.9; }
  .login-error { color: var(--danger); font-size: 13px; margin-top: 10px; display: none; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .header h1 { font-size: 18px; color: var(--accent); }
  .header .logout { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .header .logout:hover { border-color: var(--danger); color: var(--danger); }

  /* Tabs */
  .tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn { padding: 6px 14px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active { background: rgba(0,229,160,0.1); border-color: var(--accent); color: var(--accent); }

  /* Category select */
  .cat-select-wrap { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  select { padding: 8px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; cursor: pointer; }
  select:focus { border-color: var(--accent); }

  /* Product list */
  .product-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .product-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .product-item-header h3 { font-size: 15px; display: flex; align-items: center; gap: 6px; }
  .product-item-header .badge { font-size: 10px; background: rgba(0,229,160,0.1); color: var(--accent); padding: 2px 8px; border-radius: 4px; }
  .product-actions { display: flex; gap: 8px; }
  .btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger:hover { border-color: var(--danger); color: var(--danger); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-add { margin-bottom: 16px; }

  /* Price table */
  .price-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .price-table th { color: var(--muted); font-weight: 500; text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .price-table td { padding: 5px 8px; border-bottom: 1px solid rgba(42,42,58,0.5); }
  .price-table tr:last-child td { border-bottom: none; }
  .price-table input { width: 120px; padding: 4px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 12px; outline: none; }
  .price-table input:focus { border-color: var(--accent); }
  .price-table .cny-input { width: 70px; }
  .price-table .flag { font-size: 14px; }
  .price-table .country-name { color: var(--muted); }

  /* Country list */
  .country-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .country-item .info { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .country-item .info .flag { font-size: 18px; }
  .country-item .info .name { font-weight: 500; }
  .country-item .info .currency { color: var(--muted); font-size: 11px; }
  .country-item .actions { display: flex; gap: 6px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h3 { margin-bottom: 16px; font-size: 16px; color: var(--accent); }
  .modal .form-row { margin-bottom: 12px; }
  .modal label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal input { width: 100%; padding: 8px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 13px; outline: none; }
  .modal input:focus { border-color: var(--accent); }
  .modal .form-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .modal .cancel { padding: 8px 16px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 7px; cursor: pointer; font-size: 13px; }
  .modal .confirm { padding: 8px 20px; background: var(--accent); border: none; color: #000; border-radius: 7px; cursor: pointer; font-weight: 600; font-size: 13px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--card); border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 2000; }
  .toast.show { opacity: 1; }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* Stats bar */
  .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; flex: 1; min-width: 120px; }
  .stat-card .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .value { font-size: 20px; font-weight: 700; color: var(--accent); margin-top: 2px; }

  .hidden { display: none !important; }
  .section-title { font-size: 13px; color: var(--muted); margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 1px; }

  /* Price editor inline */
  .price-row { display: flex; align-items: center; gap: 6px; }
  .price-row .country-id { width: 36px; font-size: 11px; color: var(--muted); text-transform: uppercase; }
  .price-row input[type="text"] { width: 130px; }
  .price-row input.cny { width: 70px; }
  .price-row .remove-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 14px; padding: 4px; opacity: 0.6; }
  .price-row .remove-btn:hover { opacity: 1; }
  .prices-editor { max-height: 300px; overflow-y: auto; }

  /* Submissions */
  .submission-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .submission-item.pending { border-left: 3px solid var(--gold); }
  .submission-item.approved { border-left: 3px solid var(--accent); }
  .submission-item.rejected { border-left: 3px solid var(--danger); }
  .submission-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .submission-header h4 { font-size: 14px; display: flex; align-items: center; gap: 6px; }
  .submission-header .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; }
  .status-badge.pending { background: rgba(255,209,102,0.15); color: var(--gold); }
  .status-badge.approved { background: rgba(0,229,160,0.15); color: var(--accent); }
  .status-badge.rejected { background: rgba(239,68,68,0.15); color: var(--danger); }
  .submission-body { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .submission-body .price-info { color: var(--text); font-size: 14px; margin: 4px 0; }
  .submission-body .note { font-style: italic; margin-top: 6px; color: var(--muted); }
  .submission-actions { display: flex; gap: 8px; }
  .btn-approve { background: rgba(0,229,160,0.1); border-color: var(--accent); color: var(--accent); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .btn-approve:hover { background: var(--accent); color: #000; }
  .btn-reject { background: rgba(239,68,68,0.1); border-color: var(--danger); color: var(--danger); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .btn-reject:hover { background: var(--danger); color: #fff; }
  .submission-meta { font-size: 11px; color: var(--muted); margin-top: 8px; }
  .empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h2>🔐 管理后台</h2>
    <input type="password" id="passwordInput" placeholder="输入管理密码" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">登录</button>
    <div class="login-error" id="loginError">密码错误</div>
  </div>
</div>

<!-- Admin -->
<div id="adminScreen" class="container hidden">
  <div class="header">
    <h1>📊 SubPrice 管理后台</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:12px;color:var(--muted)">🔗 API: <span id="apiStatus" style="color:var(--accent)">检测中...</span></span>
      <button class="logout" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="label">国家</div><div class="value" id="statCountries">-</div></div>
    <div class="stat-card"><div class="label">产品</div><div class="value" id="statProducts">-</div></div>
    <div class="stat-card"><div class="label">分类</div><div class="value">8</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('products')">💰 产品价格管理</button>
    <button class="tab-btn" onclick="switchTab('countries')">🌍 国家管理</button>
    <button class="tab-btn" onclick="switchTab('submissions')" id="tabBtnSubmissions">📝 待审核 <span id="pendingBadge" class="hidden"></span></button>
  </div>

  <!-- Products Tab -->
  <div id="tabProducts">
    <div class="cat-select-wrap">
      <label style="font-size:12px;color:var(--muted)">分类：</label>
      <select id="catSelect" onchange="loadProducts()">
        <option value="ai">🤖 AI助手</option>
        <option value="stream">🎬 流媒体</option>
        <option value="music">🎵 音乐</option>
        <option value="creative">🎨 创作工具</option>
        <option value="cloud">☁️ 云存储</option>
        <option value="office">📋 办公协作</option>
        <option value="game">🎮 游戏</option>
        <option value="security">🔒 安全工具</option>
      </select>
      <button class="btn btn-primary" onclick="openAddProduct()">+ 添加产品</button>
    </div>
    <div id="productList"></div>
  </div>

  <!-- Countries Tab -->
  <div id="tabCountries" class="hidden">
    <button class="btn btn-primary btn-add" onclick="openAddCountry()">+ 添加国家</button>
    <div id="countryList"></div>
  </div>

  <!-- Submissions Tab -->
  <div id="tabSubmissions" class="hidden">
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button class="tab-btn active" onclick="filterSubmissions('pending')" id="filterPending">⏳ 待审核</button>
      <button class="tab-btn" onclick="filterSubmissions('approved')" id="filterApproved">✅ 已通过</button>
      <button class="tab-btn" onclick="filterSubmissions('rejected')" id="filterRejected">❌ 已拒绝</button>
    </div>
    <div id="submissionsList"></div>
  </div>
</div>

<!-- Add/Edit Product Modal -->
<div id="productModal" class="modal-overlay hidden">
  <div class="modal">
    <h3 id="productModalTitle">添加产品</h3>
    <div class="form-row"><label>产品ID</label><input id="pId" placeholder="如: chatgpt"></div>
    <div class="form-row"><label>名称</label><input id="pName" placeholder="如: ChatGPT Plus"></div>
    <div class="form-row"><label>图标 Emoji</label><input id="pIcon" placeholder="如: 🧠" maxlength="4"></div>
    <div id="pPrices" class="prices-editor"></div>
    <div class="form-actions">
      <button class="cancel" onclick="closeModal()">取消</button>
      <button class="confirm" onclick="saveProduct()">保存</button>
    </div>
  </div>
</div>

<!-- Add Country Modal -->
<div id="countryModal" class="modal-overlay hidden">
  <div class="modal">
    <h3>添加国家</h3>
    <div class="form-row"><label>国家ID</label><input id="cId" placeholder="如: cn" maxlength="5"></div>
    <div class="form-row"><label>英文名</label><input id="cName" placeholder="如: China"></div>
    <div class="form-row"><label>中文名</label><input id="cNameZh" placeholder="如: 中国"></div>
    <div class="form-row"><label>国旗 Emoji</label><input id="cFlag" placeholder="如: 🇨🇳" maxlength="4"></div>
    <div class="form-row"><label>货币代码</label><input id="cCurrency" placeholder="如: CNY" maxlength="5"></div>
    <div class="form-row"><label>货币符号</label><input id="cSymbol" placeholder="如: ¥" maxlength="5"></div>
    <div class="form-actions">
      <button class="cancel" onclick="closeModal()">取消</button>
      <button class="confirm" onclick="saveCountry()">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
  ? 'http://localhost:3000/api' 
  : 'https://subapi.future1.us/api'
let token = localStorage.getItem('adminToken') || ''
let countries = []
let currentProducts = []

function toast(msg, isError=false) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.className = 'toast' + (isError ? ' error' : '') + ' show'
  setTimeout(() => t.className = 'toast', 2500)
}

async function api(path, opts={}) {
  const headers = { 'Content-Type': 'application/json' }
  if (token) headers['x-admin-token'] = token
  const res = await fetch(API + path, { headers, ...opts })
  const json = await res.json()
  if (res.status === 401) { logout(); toast('登录已过期', true); }
  if (!res.ok) throw new Error(json.error || 'Request failed')
  return json
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  event.target.classList.add('active')
  document.getElementById('tabProducts').classList.toggle('hidden', tab !== 'products')
  document.getElementById('tabCountries').classList.toggle('hidden', tab !== 'countries')
  document.getElementById('tabSubmissions').classList.toggle('hidden', tab !== 'submissions')
  if (tab === 'submissions') loadSubmissions()
}

async function login() {
  const pw = document.getElementById('passwordInput').value
  if (!pw) return
  try {
    const res = await fetch(API + '/admin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    })
    const json = await res.json()
    if (json.success) {
      token = json.token
      localStorage.setItem('adminToken', token)
      document.getElementById('loginScreen').classList.add('hidden')
      document.getElementById('adminScreen').classList.remove('hidden')
      init()
    } else {
      document.getElementById('loginError').style.display = 'block'
    }
  } catch(e) { toast('连接失败，请确认后端已启动', true) }
}

function logout() {
  token = ''
  localStorage.removeItem('adminToken')
  document.getElementById('loginScreen').classList.remove('hidden')
  document.getElementById('adminScreen').classList.add('hidden')
}

async function init() {
  try {
    const [cats, cntrs] = await Promise.all([
      api('/categories'),
      api('/countries')
    ])
    countries = cntrs
    document.getElementById('statCountries').textContent = countries.length
    document.getElementById('apiStatus').textContent = '已连接'
    await loadProducts()
    loadCountries()
  } catch(e) {
    document.getElementById('apiStatus').textContent = '离线'
    document.getElementById('apiStatus').style.color = 'var(--danger)'
  }
}

async function loadProducts() {
  const cat = document.getElementById('catSelect').value
  try {
    const data = await api(`/products/${cat}`)
    currentProducts = data.products || []
    document.getElementById('statProducts').textContent = currentProducts.length
    renderProducts()
  } catch(e) { toast('加载产品失败', true) }
}

function renderProducts() {
  const el = document.getElementById('productList')
  el.innerHTML = currentProducts.map(p => `
    <div class="product-item">
      <div class="product-item-header">
        <h3>${p.icon} ${p.name} <span class="badge">${p.id}</span></h3>
        <div class="product-actions">
          <button class="btn" onclick="editProduct('${p.id}')">✏️ 编辑价格</button>
          <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">🗑️ 删除</button>
        </div>
      </div>
      <table class="price-table">
        <tr>
          <th>国家</th><th>本地价格</th><th>人民币(CNY)</th><th></th>
        </tr>
        ${p.monthly.map(m => {
          const c = countries.find(c => c.id === m.id) || {}
          return `<tr>
            <td><span class="flag">${c.flag||'🌍'}</span> <span class="country-name">${c.nameZh||m.id}</span></td>
            <td><input type="text" value="${m.local}" onchange="updatePrice('${p.id}','${m.id}','local',this.value)"></td>
            <td><input class="cny-input" type="number" value="${m.cny}" step="0.01" onchange="updatePrice('${p.id}','${m.id}','cny',parseFloat(this.value))"></td>
            <td><button class="remove-btn" onclick="removePrice('${p.id}','${m.id}')">×</button></td>
          </tr>`
        }).join('')}
        <tr>
          <td colspan="4"><button class="btn" onclick="addPriceRow('${p.id}')" style="font-size:11px">+ 添加国家价格</button></td>
        </tr>
      </table>
    </div>`
  ).join('')
}

let editingProductId = null
let pendingNewPrices = []

function editProduct(id) {
  editingProductId = id
  const p = currentProducts.find(x => x.id === id)
  document.getElementById('productModalTitle').textContent = '编辑价格: ' + p.name
  document.getElementById('pId').value = p.id
  document.getElementById('pId').disabled = true
  document.getElementById('pName').value = p.name
  document.getElementById('pName').disabled = true
  document.getElementById('pIcon').value = p.icon
  document.getElementById('pIcon').disabled = true
  renderPriceEditor(p.monthly)
  document.getElementById('productModal').classList.remove('hidden')
}

function openAddProduct() {
  editingProductId = null
  document.getElementById('productModalTitle').textContent = '添加产品'
  document.getElementById('pId').value = ''
  document.getElementById('pId').disabled = false
  document.getElementById('pName').value = ''
  document.getElementById('pName').disabled = false
  document.getElementById('pIcon').value = ''
  document.getElementById('pIcon').disabled = false
  renderPriceEditor([])
  document.getElementById('productModal').classList.remove('hidden')
}

function renderPriceEditor(prices) {
  pendingNewPrices = JSON.parse(JSON.stringify(prices))
  const el = document.getElementById('pPrices')
  el.innerHTML = `<div class="section-title">价格列表（人民币必填）</div>` +
    (pendingNewPrices.length ? pendingNewPrices.map((m, i) => {
      const c = countries.find(c => c.id === m.id) || {}
      return `<div class="price-row" data-idx="${i}">
        <select class="country-id" onchange="updateNewPrice(${i},'id',this.value)">
          <option value="">选择国家</option>
          ${countries.map(c => `<option value="${c.id}" ${c.id===m.id?'selected':''}>${c.flag} ${c.nameZh}</option>`).join('')}
        </select>
        <input type="text" value="${m.local}" placeholder="本地价格如: ¥120" onchange="updateNewPrice(${i},'local',this.value)">
        <input class="cny" type="number" value="${m.cny}" step="0.01" placeholder="CNY" onchange="updateNewPrice(${i},'cny',parseFloat(this.value))">
        <button class="remove-btn" onclick="removeNewPrice(${i})">×</button>
      </div>`
    }).join('') : '<div style="color:var(--muted);font-size:12px;padding:8px">暂无价格，点击下方添加</div>') +
    `<button class="btn" onclick="addNewPrice()" style="margin-top:8px">+ 添加价格</button>`
}

function updateNewPrice(idx, key, val) {
  pendingNewPrices[idx][key] = val
}

function removeNewPrice(idx) {
  pendingNewPrices.splice(idx, 1)
  renderPriceEditor(pendingNewPrices)
}

function addNewPrice() {
  pendingNewPrices.push({ id: '', local: '', cny: 0 })
  renderPriceEditor(pendingNewPrices)
}

async function saveProduct() {
  const cat = document.getElementById('catSelect').value
  const id = document.getElementById('pId').value.trim()
  const name = document.getElementById('pName').value.trim()
  const icon = document.getElementById('pIcon').value.trim() || '📦'

  if (!id) return toast('产品ID不能为空', true)
  if (!name) return toast('产品名称不能为空', true)

  const validPrices = pendingNewPrices.filter(p => p.id && p.local && p.cny)
  if (validPrices.length === 0) return toast('至少需要一个价格数据', true)

  try {
    if (editingProductId) {
      // Update existing product prices
      await api(`/products/${cat}/${id}`, {
        method: 'PUT',
        body: JSON.stringify({ monthly: validPrices })
      })
    } else {
      // Add new product
      await api(`/products/${cat}`, {
        method: 'POST',
        body: JSON.stringify({ id, name, icon, monthly: validPrices })
      })
    }
    closeModal()
    await loadProducts()
    toast(editingProductId ? '保存成功' : '添加成功')
  } catch(e) { toast(e.message, true) }
}

async function deleteProduct(id) {
  if (!confirm(`确认删除产品 ${id}？`)) return
  const cat = document.getElementById('catSelect').value
  try {
    await api(`/products/${cat}/${id}`, { method: 'DELETE' })
    await loadProducts()
    toast('已删除')
  } catch(e) { toast(e.message, true) }
}

async function updatePrice(productId, countryId, key, value) {
  const cat = document.getElementById('catSelect').value
  const p = currentProducts.find(x => x.id === productId)
  const monthly = p.monthly.map(m => m.id === countryId ? { ...m, [key]: value } : m)
  try {
    await api(`/products/${cat}/${productId}`, {
      method: 'PUT',
      body: JSON.stringify({ monthly })
    })
    p.monthly = monthly
    toast('已更新')
  } catch(e) { toast(e.message, true) }
}

async function removePrice(productId, countryId) {
  const cat = document.getElementById('catSelect').value
  const p = currentProducts.find(x => x.id === productId)
  const monthly = p.monthly.filter(m => m.id !== countryId)
  try {
    await api(`/products/${cat}/${productId}`, {
      method: 'PUT',
      body: JSON.stringify({ monthly })
    })
    p.monthly = monthly
    renderProducts()
    toast('已删除该价格')
  } catch(e) { toast(e.message, true) }
}

function addPriceRow(productId) {
  const cat = document.getElementById('catSelect').value
  const available = countries.filter(c => !currentProducts.find(x=>x.id===productId)?.monthly.find(m=>m.id===c.id))
  if (!available.length) { toast('所有国家已添加', true); return }
  const countryId = available[0].id
  const p = currentProducts.find(x => x.id === productId)
  const monthly = [...p.monthly, { id: countryId, local: '', cny: 0 }]
  updatePrice(productId, countryId, 'temp', 0) // trigger save
  // Revert and do proper add
  ;(async () => {
    await api(`/products/${cat}/${productId}`, {
      method: 'PUT', body: JSON.stringify({ monthly })
    })
    p.monthly = monthly
    renderProducts()
    toast('已添加一行，可编辑')
  })()
}

// Countries
async function loadCountries() {
  try {
    const data = await api('/countries')
    countries = data
    renderCountries()
  } catch(e) { toast('加载国家失败', true) }
}

function renderCountries() {
  document.getElementById('countryList').innerHTML = countries.map(c => `
    <div class="country-item">
      <div class="info">
        <span class="flag">${c.flag}</span>
        <span class="name">${c.nameZh} (${c.name})</span>
        <span class="currency">${c.currency} ${c.symbol}</span>
      </div>
      <div class="actions">
        <button class="btn" onclick="editCountry('${c.id}')">✏️ 编辑</button>
        <button class="btn btn-danger" onclick="deleteCountry('${c.id}')" disabled style="opacity:0.3">🗑️</button>
      </div>
    </div>`
  ).join('')
}

let editingCountryId = null

function openAddCountry() {
  editingCountryId = null
  document.getElementById('cId').value = ''
  document.getElementById('cId').disabled = false
  document.getElementById('cName').value = ''
  document.getElementById('cNameZh').value = ''
  document.getElementById('cFlag').value = ''
  document.getElementById('cCurrency').value = ''
  document.getElementById('cSymbol').value = ''
  document.getElementById('countryModal').querySelector('h3').textContent = '添加国家'
  document.getElementById('countryModal').classList.remove('hidden')
}

function editCountry(id) {
  const c = countries.find(x => x.id === id)
  editingCountryId = id
  document.getElementById('cId').value = c.id
  document.getElementById('cId').disabled = true
  document.getElementById('cName').value = c.name
  document.getElementById('cNameZh').value = c.nameZh || ''
  document.getElementById('cFlag').value = c.flag
  document.getElementById('cCurrency').value = c.currency
  document.getElementById('cSymbol').value = c.symbol
  document.getElementById('countryModal').querySelector('h3').textContent = '编辑国家: ' + c.nameZh
  document.getElementById('countryModal').classList.remove('hidden')
}

async function saveCountry() {
  const id = document.getElementById('cId').value.trim()
  const name = document.getElementById('cName').value.trim()
  const nameZh = document.getElementById('cNameZh').value.trim()
  const flag = document.getElementById('cFlag').value.trim()
  const currency = document.getElementById('cCurrency').value.trim().toUpperCase()
  const symbol = document.getElementById('cSymbol').value.trim()
  if (!id || !name || !currency) return toast('请填写必填项', true)
  try {
    if (editingCountryId) {
      await api(`/countries/${id}`, {
        method: 'PUT',
        body: JSON.stringify({ name, nameZh, flag, currency, symbol })
      })
    } else {
      await api('/countries', {
        method: 'POST',
        body: JSON.stringify({ id, name, nameZh, flag, currency, symbol })
      })
    }
    closeModal()
    await loadCountries()
    document.getElementById('statCountries').textContent = countries.length
    toast(editingCountryId ? '已更新' : '已添加')
  } catch(e) { toast(e.message, true) }
}

async function deleteCountry(id) {
  toast('暂不支持删除国家（可能影响产品数据）', true)
}

function closeModal() {
  document.getElementById('productModal').classList.add('hidden')
  document.getElementById('countryModal').classList.add('hidden')
}

// Auto login if token exists
if (token) {
  document.getElementById('loginScreen').classList.add('hidden')
  document.getElementById('adminScreen').classList.remove('hidden')
  init()
}

// ========== Submissions ==========
let currentSubmissions = []
let currentFilter = 'pending'

const CAT_NAMES = { ai: '🤖 AI助手', stream: '🎬 流媒体', music: '🎵 音乐', creative: '🎨 创作工具', cloud: '☁️ 云存储', office: '📋 办公协作', game: '🎮 游戏', security: '🔒 安全工具' }
const STATUS_NAMES = { pending: '⏳ 待审核', approved: '✅ 已通过', rejected: '❌ 已拒绝' }

async function loadSubmissions() {
  try {
    const data = await api('/admin/submissions')
    currentSubmissions = data
    updatePendingBadge()
    renderSubmissions()
  } catch(e) { toast('加载提交失败', true) }
}

function updatePendingBadge() {
  const pending = currentSubmissions.filter(s => s.status === 'pending').length
  const badge = document.getElementById('pendingBadge')
  if (pending > 0) {
    badge.textContent = pending
    badge.classList.remove('hidden')
  } else {
    badge.classList.add('hidden')
  }
}

function filterSubmissions(status) {
  currentFilter = status
  document.querySelectorAll('#tabSubmissions .tab-btn').forEach(b => b.classList.remove('active'))
  document.getElementById('filter' + status.charAt(0).toUpperCase() + status.slice(1)).classList.add('active')
  renderSubmissions()
}

function renderSubmissions() {
  const filtered = currentSubmissions.filter(s => s.status === currentFilter)
  const el = document.getElementById('submissionsList')

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state">${currentFilter === 'pending' ? '暂无待审核提交 🎉' : '暂无记录'}</div>`
    return
  }

  el.innerHTML = filtered.map(s => {
    const catName = CAT_NAMES[s.category] || s.category
    const country = countries.find(c => c.id === s.countryId) || { nameZh: s.countryId, flag: '🌍' }
    const product = getProductName(s.category, s.productId)
    const time = new Date(s.createdAt).toLocaleString('zh-CN')
    const reviewedTime = s.reviewedAt ? new Date(s.reviewedAt).toLocaleString('zh-CN') : ''

    return `<div class="submission-item ${s.status}">
      <div class="submission-header">
        <h4>${country.flag} ${country.nameZh} - ${product}</h4>
        <span class="status-badge ${s.status}">${STATUS_NAMES[s.status]}</span>
      </div>
      <div class="submission-body">
        <div>分类：${catName}</div>
        <div>产品：${s.productId}</div>
        <div class="price-info">💰 本地价格：${s.local} | ¥CNY：${s.cny}</div>
        ${s.submitterNote ? `<div class="note">📝 备注：${s.submitterNote}</div>` : ''}
      </div>
      ${s.status === 'pending' ? `
        <div class="submission-actions">
          <button class="btn-approve" onclick="reviewSubmission('${s.id}', 'approve')">✅ 通过</button>
          <button class="btn-reject" onclick="reviewSubmission('${s.id}', 'reject')">❌ 拒绝</button>
        </div>
      ` : `<div class="submission-meta">审核时间：${reviewedTime} ${s.reviewerNote ? '| 备注：' + s.reviewerNote : ''}</div>`}
      <div class="submission-meta">提交时间：${time}</div>
    </div>`
  }).join('')
}

function getProductName(cat, id) {
  // Try to find from loaded products
  const catData = window._catProducts ? window._catProducts[cat] : null
  if (catData) {
    const p = catData.products ? catData.products.find(x => x.id === id) : null
    if (p) return p.icon + ' ' + p.name
  }
  return id
}

async function reviewSubmission(id, action) {
  try {
    await api(`/admin/submissions/${id}`, {
      method: 'PUT',
      body: JSON.stringify({ action })
    })
    toast(action === 'approve' ? '已通过，数据已更新' : '已拒绝')
    await loadSubmissions()
    // Reload products if approved
    if (action === 'approve') await loadProducts()
  } catch(e) { toast(e.message, true) }
}
