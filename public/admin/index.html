<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubPrice 管理后台</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <div class="login-box glass">
    <h2>🔐 管理后台</h2>
    <input type="password" id="passwordInput" placeholder="输入管理密码" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">登 录</button>
    <div class="login-error" id="loginError">密码错误</div>
  </div>
</div>

<!-- Main Admin Screen -->
<div id="adminScreen" class="container hidden">
  <div class="header">
    <h1>📊 SubPrice Admin</h1>
    <div style="display:flex; align-items:center; gap:16px">
      <span style="font-size:12px; color:var(--muted)">
        API: <span id="apiStatus">检测中...</span>
      </span>
      <button class="logout" onclick="logout()">退出登录</button>
    </div>
  </div>

  <!-- Stats Overview -->
  <div class="stats">
    <div class="stat-card">
      <div class="label">国家/地区</div>
      <div class="value" id="statCountries">-</div>
    </div>
    <div class="stat-card">
      <div class="label">当前产品</div>
      <div class="value" id="statProducts">-</div>
    </div>
    <div class="stat-card">
      <div class="label">系统分类</div>
      <div class="value">8</div>
    </div>
  </div>

  <!-- Navigation Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('products')">💰 产品管理</button>
    <button class="tab-btn" onclick="switchTab('countries')">🌍 国家管理</button>
    <button class="tab-btn" onclick="switchTab('submissions')" id="tabBtnSubmissions">
      📝 审核列表 <span id="pendingBadge" class="hidden">0</span>
    </button>
  </div>

  <!-- Products Tab Content -->
  <div id="tabProducts">
    <div class="cat-select-wrap">
      <select id="catSelect" onchange="loadProducts()">
        <option value="ai">🤖 AI助手</option>
        <option value="stream">🎬 流媒体</option>
        <option value="music">🎵 音乐</option>
        <option value="creative">🎨 创作工具</option>
        <option value="cloud">☁️ 云存储</option>
        <option value="office">📋 办公协作</option>
        <option value="game">🎮 游戏</option>
        <option value="security">🔒 安全工具</option>
      </select>
      <button class="btn btn-primary" onclick="openAddProduct()">+ 添加新产品</button>
    </div>
    <div id="productList"></div>
  </div>

  <!-- Countries Tab Content -->
  <div id="tabCountries" class="hidden">
    <button class="btn btn-primary" style="margin-bottom:16px" onclick="openAddCountry()">+ 添加新国家</button>
    <div id="countryList"></div>
  </div>

  <!-- Submissions Tab Content -->
  <div id="tabSubmissions" class="hidden">
    <div class="tabs" style="margin-bottom:16px">
      <button class="tab-btn active" onclick="filterSubmissions('pending')" id="filterPending">⏳ 待处理</button>
      <button class="tab-btn" onclick="filterSubmissions('approved')" id="filterApproved">✅ 已通过</button>
      <button class="tab-btn" onclick="filterSubmissions('rejected')" id="filterRejected">❌ 已拒绝</button>
    </div>
    <div id="submissionsList"></div>
  </div>
</div>

<!-- Product Modal -->
<div id="productModal" class="modal-overlay hidden">
  <div class="modal">
    <h3 id="productModalTitle">添加产品</h3>
    <div class="form-row">
      <label>产品唯一ID (ID)</label>
      <input id="pId" placeholder="如: netflix">
    </div>
    <div class="form-row">
      <label>显示名称 (Name)</label>
      <input id="pName" placeholder="如: Netflix Standard">
    </div>
    <div class="form-row">
      <label>图标 (Icon Emoji)</label>
      <input id="pIcon" placeholder="如: 🎬">
    </div>
    <div id="pPrices" class="prices-editor"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveProduct()">保存更改</button>
    </div>
  </div>
</div>

<!-- Country Modal -->
<div id="countryModal" class="modal-overlay hidden">
  <div class="modal">
    <h3>国家/地区管理</h3>
    <div class="form-row"><label>ID</label><input id="cId" placeholder="如: tr"></div>
    <div class="form-row"><label>英文名称</label><input id="cName" placeholder="如: Turkey"></div>
    <div class="form-row"><label>中文名称</label><input id="cNameZh" placeholder="如: 土耳其"></div>
    <div class="form-row"><label>旗帜 Emoji</label><input id="cFlag" placeholder="如: 🇹🇷"></div>
    <div class="form-row"><label>货币代码</label><input id="cCurrency" placeholder="如: TRY"></div>
    <div class="form-row"><label>货币符号</label><input id="cSymbol" placeholder="如: ₺"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveCountry()">确认保存</button>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<!-- Scripts -->
<script src="app.js"></script>
</body>
</html>
